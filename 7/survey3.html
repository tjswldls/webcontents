<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>설문지</title>
    </head>
    <body>
        <header>
            <h3>설문지</h3>
            소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.
            <hr>
        </header>
        <section>
                <form>
                    <article>
                        학년 <input type="radio" name="grade" value="1">
                            1학년
                        <input type="radio" name="grade" value="2">
                            2학년
                        <input type="radio" name="grade" value="3">
                            3학년<br><br>
                    </article>
                    <article>
                        성별 <input type="radio" name="gender" value="1">
                            남
                        <input type="radio" name="gender" value="2">
                            여<br><br>
                    </article>
                    <article>
                        관심 분야 <select name="sphere">
                            <option value="1">모바일 소프트웨어</option>
                            <option value="2">소프트웨어</option>
                            <option value="3">컴퓨터</option>
                            <option value="4">문제해결</option>
                        </select><br><br>
                    </article>
                    <article>
                        진로 <input type="radio" name="course" value="1">
                                개발
                        <input type="radio" name="course" value="2">
                            기획
                        <input type="radio" name="course" value="3">
                            영업
                        <input type="radio" name="course" value="2">
                            창업<br><br> 
                    </article>
                    <article>
                    남기고 싶은 말 <textarea cols="70" rows="10" placeholder="글을 남겨주세요"></textarea><br><br></article>
                    <footer>
                        Copyright 2026 by MYONGJI COLLEGE
                    </footer>
                </form>
        </section>
    </body>
</html>
